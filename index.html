<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري الصيانة</title>

    <!-- خط عربي فاخر -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background: #000;
            color: #d4af37;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(212,175,55,0.3);
            box-shadow: 0 0 40px rgba(212,175,55,0.15);
            max-width: 420px;
        }

        h1 {
            font-size: 40px;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(212,175,55,0.7);
        }

        p {
            font-size: 18px;
            margin: 6px 0;
            color: #eee;
        }

        #countdown {
            font-size: 36px;
            margin-top: 20px;
            font-weight: bold;
            color: #d4af37;
            text-shadow: 0 0 12px rgba(212,175,55,0.8);
            letter-spacing: 2px;
        }

        .footer {
            margin-top: 20px;
            font-size: 16px;
            opacity: 0.7;
            color: #aaa;
        }

        .line {
            width: 60%;
            height: 1px;
            margin: 15px auto;
            background: linear-gradient(to right, transparent, #d4af37, transparent);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚧 جاري الصيانة</h1>

        <div class="line"></div>

        <p>التطبيق غير متاح حالياً</p>
        <p>برجاء العودة قريباً</p>

        <div id="countdown"></div>

        <div class="footer">— مصطفى —</div>
    </div>

    <script>
        function getTargetTime() {
            let now = new Date();
            let target = new Date();
            target.setDate(now.getDate() + 1);
            target.setHours(21, 0, 0, 0);
            return target;
        }

        let targetTime = getTargetTime();

        function updateCountdown() {
            let now = new Date();
            let diff = targetTime - now;

            if (diff <= 0) {
                document.getElementById("countdown").innerHTML = "✔ تم الانتهاء";
                return;
            }

            let hours = Math.floor(diff / (1000 * 60 * 60));
            let minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            let seconds = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML =
                String(hours).padStart(2, '0') + ":" +
                String(minutes).padStart(2, '0') + ":" +
                String(seconds).padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
